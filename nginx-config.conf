# NEXUS SECURE Nginx Configuration
# Copy to: /etc/nginx/sites-available/nexus-secure
# Then: sudo ln -s /etc/nginx/sites-available/nexus-secure /etc/nginx/sites-enabled/

# Rate limiting zone (must be in http context, not server block)
limit_req_zone $binary_remote_addr zone=nexus_limit:10m rate=100r/m;

upstream nexus_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexus-secure-mess.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus-secure-mess.com;

    # SSL Certificates (Let's Encrypt with Certbot)
    ssl_certificate /etc/letsencrypt/live/nexus-secure-mess.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus-secure-mess.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers ON;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Compress responses
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript;
    gzip_vary on;

    # Rate limiting (zone defined in http context above)
    limit_req zone=nexus_limit burst=10;

    # Root location
    root /opt/nexus-secure;

    # Proxy configuration
    location / {
        proxy_pass https://nexus_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for long-lived connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /cert\.(key|crt)$ {
        deny all;
    }

    # Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
